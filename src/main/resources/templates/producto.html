<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Lista de Productos</h1>

    <a th:href="@{/producto/crear}" class="btn btn-primary mb-3">+ Nuevo Producto</a>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="producto : ${producto}">
            <td th:text="${producto.id}">1</td>
            <td th:text="${producto.nombre}">Producto</td>
            <td th:text="${producto.cantidad}">10 unidades</td>

            <td th:text="${producto.costo}">$100.00</td>
            <td>
                <a th:href="@{/producto/editar/{id}(id=${producto.id})}"
                   class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/producto/eliminar/{id}(id=${producto.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${producto.isEmpty()}">
            <td colspan="5" class="text-center">No hay productos registrados</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/producto/crear_registro}" class="btn btn-success">Crear Nuevo Producto</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
