<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Crear Nuevo Producto</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/producto}" th:object="${producto}" method="post">
                <!-- Campo para el nombre -->
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del Producto:</label>
                    <input type="text"
                           id="nombre"
                           class="form-control"
                           th:field="*{nombre}"
                           required
                           maxlength="45"
                           placeholder="Ej: Laptop HP, Mouse Logitech">
                </div>

                <!-- Campo para la cantidad -->
                <div class="mb-3">
                    <label for="cantidad" class="form-label">Cantidad:</label>
                    <input type="text"
                           id="cantidad"
                           class="form-control"
                           th:field="*{cantidad}"
                           placeholder="Ej: 10 unidades, 5 kg, 2 litros">
                </div>

                <!-- Campo para el precio -->
                <div class="mb-3">
                    <label for="costo" class="form-label">Precio:</label>
                    <input type="text"
                           id="costo"
                           class="form-control"
                           th:field="*{costo}"
                           placeholder="Ej: $899.99, USD 25.50">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar Producto</button>
                    <a th:href="@{/producto}" class="btn btn-secondary">Volver a la lista</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
